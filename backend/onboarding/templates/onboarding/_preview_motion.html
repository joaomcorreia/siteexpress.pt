<script>
(() => {
  const body = document.body;
  if (!body) return;

  const currentParams = new URLSearchParams(window.location.search);
  const preservedParams = ["variation", "layout", "motion", "embed"];
  document.querySelectorAll("a[href]").forEach((link) => {
    const target = new URL(link.href, window.location.href);
    if (target.origin !== window.location.origin || target.pathname !== window.location.pathname) return;
    preservedParams.forEach((name) => {
      if (currentParams.has(name) && !target.searchParams.has(name)) {
        target.searchParams.set(name, currentParams.get(name));
      }
    });
    link.href = target.toString();
  });

  if (body.classList.contains("se-motion-minimal")) return;

  const targets = document.querySelectorAll(
    ".nav-card, .hero, .section, .footer-shell"
  );
  const childSelector = [
    ".section-title",
    ".section-media-grid > *",
    ".featured-grid > .service-item",
    ".services-list > .service-item",
    ".services-card-grid > .service-item",
    ".cta-actions > *",
    ".hero > :not(.hero-image)",
    ".footer-grid > *"
  ].join(", ");

  targets.forEach((target) => {
    target.classList.add("se-motion-target");
    target.querySelectorAll(childSelector).forEach((child, index) => {
      child.classList.add("se-motion-child");
      child.style.setProperty("--se-child-order", String(Math.min(index, 5)));
    });
  });

  if (!("IntersectionObserver" in window)) {
    targets.forEach((target) => target.classList.add("se-revealed"));
    return;
  }

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("se-revealed");
        observer.unobserve(entry.target);
      });
    },
    { threshold: 0.12, rootMargin: "0px 0px -5% 0px" }
  );
  targets.forEach((target) => observer.observe(target));
})();
</script>
