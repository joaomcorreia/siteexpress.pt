<script>
(() => {
  const body = document.body;
  if (!body) return;

  const currentParams = new URLSearchParams(window.location.search);
  const preservedParams = ["variation", "layout", "motion", "embed"];
  document.querySelectorAll("a[href]").forEach((link) => {
    const target = new URL(link.href, window.location.href);
    if (target.origin !== window.location.origin || target.pathname !== window.location.pathname) return;
    preservedParams.forEach((name) => {
      if (currentParams.has(name) && !target.searchParams.has(name)) {
        target.searchParams.set(name, currentParams.get(name));
      }
    });
    link.href = target.toString();
  });

  const prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  document.querySelectorAll("[data-hero-slider]").forEach((slider) => {
    const slides = Array.from(slider.querySelectorAll("[data-hero-slide]"));
    const buttons = Array.from(slider.querySelectorAll("[data-hero-slide-button]"));
    let activeIndex = 0;
    let timer = null;

    const showSlide = (nextIndex) => {
      activeIndex = (nextIndex + slides.length) % slides.length;
      slides.forEach((slide, index) => {
        const active = index === activeIndex;
        slide.classList.toggle("is-active", active);
        slide.setAttribute("aria-hidden", active ? "false" : "true");
      });
      buttons.forEach((button, index) => {
        const active = index === activeIndex;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
    };
    const stop = () => {
      if (timer) window.clearInterval(timer);
      timer = null;
    };
    const start = () => {
      stop();
      if (!prefersReducedMotion && slides.length > 1) {
        timer = window.setInterval(() => showSlide(activeIndex + 1), 6500);
      }
    };

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        showSlide(Number(button.dataset.heroSlideButton || 0));
        start();
      });
    });
    slider.addEventListener("mouseenter", stop);
    slider.addEventListener("mouseleave", start);
    slider.addEventListener("focusin", stop);
    slider.addEventListener("focusout", start);
    showSlide(0);
    start();
  });

  document.querySelectorAll("[data-quote-form]").forEach((form) => {
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const recipient = form.dataset.recipient || "";
      const data = new FormData(form);
      const feedback = form.querySelector("[data-quote-feedback]");
      if (feedback) feedback.hidden = false;
      if (!recipient) return;
      const subject = `Pedido de orçamento — ${data.get("service") || "Website"}`;
      const body = [
        `Nome: ${data.get("name") || ""}`,
        `Telefone: ${data.get("phone") || ""}`,
        `Serviço: ${data.get("service") || ""}`,
        "",
        String(data.get("message") || "")
      ].join("\n");
      window.location.href = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    });
  });

  if (body.classList.contains("se-motion-minimal")) return;

  const targets = document.querySelectorAll(
    ".nav-card, .hero, .section, .footer-shell"
  );
  const childSelector = [
    ".section-title",
    ".section-media-grid > *",
    ".featured-grid > .service-item",
    ".services-list > .service-item",
    ".services-card-grid > .service-item",
    ".portfolio-grid > .portfolio-item",
    ".quote-layout > *",
    ".map-layout > *",
    ".cta-actions > *",
    ".hero > :not(.hero-image)",
    ".footer-grid > *"
  ].join(", ");

  targets.forEach((target) => {
    target.classList.add("se-motion-target");
    target.querySelectorAll(childSelector).forEach((child, index) => {
      child.classList.add("se-motion-child");
      child.style.setProperty("--se-child-order", String(Math.min(index, 5)));
      if (child.matches(".section-media-grid > *, .featured-grid > .service-item, .services-list > .service-item, .services-card-grid > .service-item, .portfolio-grid > .portfolio-item, .quote-layout > *, .map-layout > *")) {
        child.classList.add(index % 2 === 0 ? "se-motion-from-left" : "se-motion-from-right");
      }
    });
  });

  if (!("IntersectionObserver" in window)) {
    targets.forEach((target) => target.classList.add("se-revealed"));
    return;
  }

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("se-revealed");
        observer.unobserve(entry.target);
      });
    },
    { threshold: 0.12, rootMargin: "0px 0px -5% 0px" }
  );
  targets.forEach((target) => observer.observe(target));
})();
</script>
