<style>
  .cookie-consent{position:fixed;z-index:60;left:16px;right:16px;bottom:16px;display:none;max-width:920px;margin:auto;padding:18px 20px;background:#fffdf8;color:#172018;border:1px solid #cfd8cb;border-radius:12px;box-shadow:0 18px 50px rgba(23,32,24,.22)}
  .cookie-consent.is-visible{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:20px;align-items:center}
  .cookie-consent p{margin:0;color:#5f695e;font-size:.94rem}
  .cookie-consent a{color:#046a38;text-decoration:underline;text-underline-offset:3px}
  .cookie-actions{display:flex;gap:10px;flex-wrap:wrap}
  .cookie-button{min-height:42px;padding:10px 14px;border-radius:8px;border:1px solid #cfd8cb;background:#fff;color:#172018;font:inherit;font-weight:850;cursor:pointer}
  .cookie-button.primary{background:#046a38;color:#fff;border-color:#046a38}
  @media(max-width:720px){.cookie-consent.is-visible{grid-template-columns:1fr}.cookie-actions{display:grid}.cookie-button{width:100%}}
</style>
<aside class="cookie-consent" id="siteexpress-cookie-consent" aria-label="Preferências de cookies" aria-live="polite">
  <p>Utilizamos armazenamento necessário para guardar a sua escolha. Com autorização, usamos analytics para melhorar o website. Consulte a <a href="{% url 'siteexpress-cookies' %}">Política de Cookies</a>.</p>
  <div class="cookie-actions">
    <button class="cookie-button" type="button" data-cookie-choice="denied">Continuar sem analytics</button>
    <button class="cookie-button primary" type="button" data-cookie-choice="granted">Aceitar analytics</button>
  </div>
</aside>
<script>
  (function(window, document){
    var consentKey = "siteexpress_analytics_consent";
    var banner = document.getElementById("siteexpress-cookie-consent");
    if (!banner) return;

    var storedChoice = null;
    try { storedChoice = window.localStorage.getItem(consentKey); } catch (error) {}
    if (storedChoice !== "granted" && storedChoice !== "denied") {
      banner.classList.add("is-visible");
    }

    banner.addEventListener("click", function(event){
      var button = event.target.closest("[data-cookie-choice]");
      if (!button) return;
      var choice = button.getAttribute("data-cookie-choice");
      try { window.localStorage.setItem(consentKey, choice); } catch (error) {}
      banner.classList.remove("is-visible");
      window.dispatchEvent(new CustomEvent("siteexpress:analytics-consent", {detail: choice}));
    });
  })(window, document);
</script>
